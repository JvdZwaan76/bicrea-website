<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="BICREA">
  <title>BICREA</title>
  <!-- Near-black square background with hairline gold edge -->
  <rect x="0" y="0" width="64" height="64" rx="12" fill="#0a0a0a"/>
  <rect x="0.5" y="0.5" width="63" height="63" rx="11.5" fill="none" stroke="rgba(212,175,55,0.35)" stroke-width="1"/>
  <!-- Brand diamond/lozenge ◊ mark in gold gradient -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="50%" stop-color="#f4d03f"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
  </defs>
  <!-- Diamond shape, centred -->
  <path d="M 32 16 L 46 32 L 32 48 L 18 32 Z"
        fill="url(#g)"
        stroke="#b8941f"
        stroke-width="0.5"
        stroke-linejoin="miter"/>
  <!-- Inner highlight stroke for depth -->
  <path d="M 32 20 L 42 32 L 32 44 L 22 32 Z"
        fill="none"
        stroke="rgba(255,255,255,0.18)"
        stroke-width="0.5"/>
</svg>
